<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Charizard (EX) Price Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #f5f7fb;
            --card: #ffffff;
            --text: #1f2937;
            --muted: #6b7280;
            --primary: #111827;
            --primary-hover: #000000;
            --border: #e5e7eb;
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
            --radius: 20px;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: linear-gradient(180deg, #f8fafc 0%, #eef2ff 100%);
            color: var(--text);
        }

        .page {
            max-width: 1100px;
            margin: 0 auto;
            padding: 40px 20px 60px;
        }

        .hero {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }

        .hero-text h1 {
            margin: 0 0 8px;
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: -0.02em;
        }

        .hero-text p {
            margin: 0;
            color: var(--muted);
            font-size: 1rem;
        }

        .calculate-btn {
            border: none;
            background: var(--primary);
            color: white;
            padding: 14px 24px;
            border-radius: 14px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.15s ease, opacity 0.15s ease, background 0.15s ease;
            box-shadow: var(--shadow);
        }

        .calculate-btn:hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
        }

        .calculate-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
        }

        .chart-card {
            padding: 24px;
        }

        .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 18px;
        }

        .chart-title {
            font-size: 1.1rem;
            font-weight: 600;
        }

        .chart-subtitle {
            color: var(--muted);
            font-size: 0.92rem;
        }

        .chart-wrapper {
            position: relative;
            height: 420px;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 16px;
            margin-top: 20px;
        }

        .stat-box {
            padding: 18px;
            border: 1px solid var(--border);
            border-radius: 16px;
            background: #fafafa;
        }

        .stat-label {
            font-size: 0.85rem;
            color: var(--muted);
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 1.2rem;
            font-weight: 700;
        }

        .message {
            margin-top: 18px;
            min-height: 24px;
            font-size: 0.95rem;
            color: var(--muted);
        }

        .message.error {
            color: #b91c1c;
        }

        .message.success {
            color: #166534;
        }

        @media (max-width: 800px) {
            .stats {
                grid-template-columns: 1fr;
            }

            .chart-wrapper {
                height: 320px;
            }
        }
    </style>
</head>
<body>
<div class="page">
    <div class="hero">
        <div class="hero-text">
            <h1>Charizard (EX) Price Tracker</h1>
            <p>Storico delle medie calcolate per le offerte del Charizard Set Base in condizione EX, escludendo i 3 prezzi più alti.</p>
        </div>

        <button id="calculateBtn" class="calculate-btn">CALCOLA</button>
    </div>

    <div class="card chart-card">
        <div class="chart-header">
            <div>
                <div class="chart-title">Andamento della media</div>
                <div class="chart-subtitle">Date sulle ascisse, prezzo medio sulle ordinate</div>
            </div>
        </div>

        <div class="chart-wrapper">
            <canvas id="priceChart"></canvas>
        </div>

        <div class="stats">
            <div class="stat-box">
                <div class="stat-label">Numero rilevazioni</div>
                <div class="stat-value" id="totalPoints">0</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Ultima media</div>
                <div class="stat-value" id="lastAverage">-</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Ultimo aggiornamento</div>
                <div class="stat-value" id="lastDate">-</div>
            </div>
        </div>

        <div id="message" class="message"></div>
    </div>
</div>

<script>
    const historyUrl = '/api/scraping/cardmarket/history';
    const calculateUrl = '/api/scraping/cardmarket/ex-average';

    let priceChart = null;

    async function loadHistory() {
        const response = await fetch(historyUrl);
        if (!response.ok) {
            throw new Error('Errore nel caricamento dello storico');
        }
        return await response.json();
    }

    function formatPrice(value) {
        if (value === null || value === undefined) {
            return '-';
        }

        return new Intl.NumberFormat('it-IT', {
            style: 'currency',
            currency: 'EUR'
        }).format(value);
    }

    function formatDateTime(value) {
        if (!value) {
            return '-';
        }

        const date = new Date(value);
        return new Intl.DateTimeFormat('it-IT', {
            dateStyle: 'short',
            timeStyle: 'short'
        }).format(date);
    }

    function buildChart(history) {
        const labels = history.map(item => formatDateTime(item.calculatedAt));
        const data = history.map(item => Number(item.averagePrice));

        const ctx = document.getElementById('priceChart').getContext('2d');

        if (priceChart) {
            priceChart.destroy();
        }

        priceChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{
                    label: 'Prezzo medio',
                    data: data,
                    borderWidth: 2,
                    tension: 0.25,
                    pointRadius: 5,
                    pointHoverRadius: 7,
                    fill: false
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: {
                        display: true
                    },
                    tooltip: {
                        callbacks: {
                            label: function(context) {
                                return 'Media: ' + formatPrice(context.parsed.y);
                            }
                        }
                    }
                },
                scales: {
                    y: {
                        title: {
                            display: true,
                            text: 'Prezzo (€)'
                        }
                    },
                    x: {
                        title: {
                            display: true,
                            text: 'Data calcolo'
                        }
                    }
                }
            }
        });
    }

    function updateStats(history) {
        const totalPointsEl = document.getElementById('totalPoints');
        const lastAverageEl = document.getElementById('lastAverage');
        const lastDateEl = document.getElementById('lastDate');

        totalPointsEl.textContent = history.length;

        if (history.length === 0) {
            lastAverageEl.textContent = '-';
            lastDateEl.textContent = '-';
            return;
        }

        const lastItem = history[history.length - 1];
        lastAverageEl.textContent = formatPrice(Number(lastItem.averagePrice));
        lastDateEl.textContent = formatDateTime(lastItem.calculatedAt);
    }

    function setMessage(text, type = '') {
        const messageEl = document.getElementById('message');
        messageEl.textContent = text;
        messageEl.className = 'message' + (type ? ' ' + type : '');
    }

    async function refreshChartAndStats() {
        const history = await loadHistory();
        buildChart(history);
        updateStats(history);

        if (history.length === 0) {
            setMessage('Nessun dato presente. Premi CALCOLA per creare il primo punto sul grafico.');
        } else {
            setMessage('Dati caricati correttamente.');
        }
    }

    async function calculateAverage() {
        const button = document.getElementById('calculateBtn');
        button.disabled = true;
        setMessage('Calcolo in corso...');

        try {
            const response = await fetch(calculateUrl);
            if (!response.ok) {
                throw new Error('Errore durante il calcolo della media');
            }

            await response.json();
            await refreshChartAndStats();
            setMessage('Nuova media calcolata e grafico aggiornato.', 'success');
        } catch (error) {
            console.error(error);
            setMessage('Si è verificato un errore durante il calcolo o il refresh dei dati.', 'error');
        } finally {
            button.disabled = false;
        }
    }

    document.getElementById('calculateBtn').addEventListener('click', calculateAverage);

    window.addEventListener('load', async () => {
        try {
            await refreshChartAndStats();
        } catch (error) {
            console.error(error);
            setMessage('Errore nel caricamento iniziale della pagina.', 'error');
        }
    });
</script>
</body>
</html>
